<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>
        <nav th:replace="~{general/fragmentos :: navbar}"></nav>

        <main class="container mt-5">

            <div class="row">
                <div class="col-md-4">

                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0">
                                <i class="fa-solid fa-calendar-plus"></i>
                                Nueva reserva
                            </h4>
                        </div>

                        <div class="card-body">
                            <form th:action="@{/reserva/guardar}" th:object="${reserva}" method="post">

                                <div class="mb-3">
                                    <label class="form-label">Nombre del cliente</label>
                                    <input type="text" class="form-control" th:field="*{nombreCliente}"
                                           placeholder="Ej: Ana Rodríguez" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Fecha</label>
                                    <input type="date" class="form-control" th:field="*{fecha}" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Servicio</label>
                                    <select class="form-select" th:field="*{servicio.id}" required>
                                        <option value="" disabled selected>Seleccione un servicio</option>
                                        <option th:each="servicio : ${servicios}"
                                                th:value="${servicio.id}"
                                                th:text="${servicio.nombre}">
                                        </option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-save"></i>
                                    Guardar
                                </button>

                            </form>
                        </div>
                    </div>

                </div>

                <div class="col-md-8">

                    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

                    <div class="card shadow">
                        <div class="card-header bg-dark text-white">
                            <h4 class="mb-0">
                                <i class="fa-solid fa-calendar-check"></i>
                                Reservas de clases
                            </h4>
                        </div>

                        <div class="card-body">

                            <table class="table table-striped table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Cliente</th>
                                        <th>Fecha</th>
                                        <th>Servicio</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr th:each="reserva : ${reservas}">
                                        <td th:text="${reserva.id}"></td>
                                        <td th:text="${reserva.nombreCliente}"></td>
                                        <td th:text="${reserva.fecha}"></td>
                                        <td th:text="${reserva.servicio.nombre}"></td>
                                        <td class="text-center">

                                            <a th:href="@{/reserva/modificar/{id}(id=${reserva.id})}"
                                               class="btn btn-warning btn-sm">
                                                <i class="fa-solid fa-pen-to-square"></i>
                                                Editar
                                            </a>

                                            <form th:action="@{/reserva/eliminar}" method="post"
                                                  class="d-inline">
                                                <input type="hidden" name="id" th:value="${reserva.id}">
                                                <button type="submit" class="btn btn-danger btn-sm"
                                                        onclick="return confirm('¿Desea eliminar esta reserva?')">
                                                    <i class="fa-solid fa-trash"></i>
                                                    Eliminar
                                                </button>
                                            </form>

                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>

                </div>
            </div>

        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
