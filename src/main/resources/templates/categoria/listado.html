<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>

<body>

<header th:replace="~{general/fragmentos :: header}"></header>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>

<main class="container mt-5">

    <div class="row">
        <div class="col-md-4">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fa-solid fa-plus"></i>
                        Nueva categoría
                    </h4>
                </div>

                <div class="card-body">
                    <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Nombre de la categoría</label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   placeholder="Ej: Cardio" required>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-save"></i>
                            Guardar
                        </button>

                    </form>
                </div>
            </div>

        </div>

        <div class="col-md-8">

            <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">
                        <i class="fa-solid fa-list"></i>
                        Categorías de entrenamiento
                    </h4>
                </div>

                <div class="card-body">

                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="categoria : ${categorias}">
                            <td th:text="${categoria.id}"></td>
                            <td th:text="${categoria.nombre}"></td>
                            <td class="text-center">

                                <a th:href="@{/categoria/modificar/{id}(id=${categoria.id})}"
                                   class="btn btn-warning btn-sm">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                    Editar
                                </a>

                                <form th:action="@{/categoria/eliminar}" method="post"
                                      class="d-inline">
                                    <input type="hidden" name="id" th:value="${categoria.id}">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('¿Desea eliminar esta categoría?')">
                                        <i class="fa-solid fa-trash"></i>
                                        Eliminar
                                    </button>
                                </form>

                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </div>

</main>

<footer th:replace="~{general/fragmentos :: footer}"></footer>

</body>
</html>
