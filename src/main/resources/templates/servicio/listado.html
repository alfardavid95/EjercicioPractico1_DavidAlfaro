<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>
        <nav th:replace="~{general/fragmentos :: navbar}"></nav>

        <main class="container mt-5">

            <div class="row">
                <div class="col-md-4">

                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0">
                                <i class="fa-solid fa-plus"></i>
                                Nuevo servicio
                            </h4>
                        </div>

                        <div class="card-body">
                            <form th:action="@{/servicio/guardar}" th:object="${servicio}" method="post">

                                <div class="mb-3">
                                    <label class="form-label">Nombre del servicio</label>
                                    <input type="text" class="form-control" th:field="*{nombre}"
                                           placeholder="Ej: Clase de CrossFit" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Precio</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{precio}"
                                           placeholder="Ej: 8000" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Categoría</label>
                                    <select class="form-select" th:field="*{categoria.id}" required>
                                        <option value="" disabled>Seleccione una categoría</option>
                                        <option th:each="categoria : ${categorias}"
                                                th:value="${categoria.id}"
                                                th:text="${categoria.nombre}">
                                        </option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-save"></i>
                                    Guardar
                                </button>

                            </form>
                        </div>
                    </div>

                </div>

                <div class="col-md-8">

                    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <div class="card shadow">
                        <div class="card-header bg-dark text-white">
                            <h4 class="mb-0">
                                <i class="fa-solid fa-dumbbell"></i>
                                Servicios de entrenamiento
                            </h4>
                        </div>

                        <div class="card-body">

                            <table class="table table-striped table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Precio</th>
                                        <th>Categoría</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr th:each="servicio : ${servicios}">
                                        <td th:text="${servicio.id}"></td>
                                        <td th:text="${servicio.nombre}"></td>
                                        <td th:text="${servicio.precio}"></td>
                                        <td th:text="${servicio.categoria.nombre}"></td>
                                        <td class="text-center">

                                            <a th:href="@{/servicio/modificar/{id}(id=${servicio.id})}"
                                               class="btn btn-warning btn-sm">
                                                <i class="fa-solid fa-pen-to-square"></i>
                                                Editar
                                            </a>

                                            <form th:action="@{/servicio/eliminar}" method="post"
                                                  class="d-inline">
                                                <input type="hidden" name="id" th:value="${servicio.id}">
                                                <button type="submit" class="btn btn-danger btn-sm"
                                                        onclick="return confirm('¿Desea eliminar este servicio?')">
                                                    <i class="fa-solid fa-trash"></i>
                                                    Eliminar
                                                </button>
                                            </form>

                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>

                </div>
            </div>

        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
