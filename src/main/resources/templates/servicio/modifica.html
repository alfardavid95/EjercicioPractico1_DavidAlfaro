<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>
        <nav th:replace="~{general/fragmentos :: navbar}"></nav>

        <main class="container mt-5">

            <div class="row justify-content-center">
                <div class="col-md-7">

                    <div class="card shadow">
                        <div class="card-header bg-warning text-dark">
                            <h4 class="mb-0">
                                <i class="fa-solid fa-pen-to-square"></i>
                                Modificar servicio
                            </h4>
                        </div>

                        <div class="card-body">

                            <form th:action="@{/servicio/guardar}" th:object="${servicio}" method="post">

                                <input type="hidden" th:field="*{id}">

                                <div class="mb-3">
                                    <label class="form-label">Nombre del servicio</label>
                                    <input type="text" class="form-control" th:field="*{nombre}" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Precio</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Categoría</label>
                                    <select class="form-select" th:field="*{categoria.id}" required>
                                        <option th:each="categoria : ${categorias}"
                                                th:value="${categoria.id}"
                                                th:text="${categoria.nombre}">
                                        </option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-save"></i>
                                    Guardar cambios
                                </button>

                                <a th:href="@{/servicio/listado}" class="btn btn-secondary">
                                    Cancelar
                                </a>

                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
